defaults:
  # MuJoCo environment
  env_id: 
  # Discount factor
  gamma: 0.99
  # Policy parameters
  # Lambda for the upper bound
  lambd: 5
  # std Gaussian noise
  sigma: 1
  # Whether to anneal sigma linearly to zero.
  anneal_sigma: False
  # K neighbors
  k: 1000
  # Policy execution mode: "mint" or "chain"
  policy_type: "mint"
  # Whether to collect refinement trajectories using parallel vine rollouts.
  use_vine_collection: True
  # Number of parallel environments to branch at each vine step.
  num_envs: 4
  # FAISS OpenMP threads per process. Keep low when running multiple jobs on a laptop.
  faiss_threads: 2
  # Query chunk size for dense distance reductions. Lower uses less RAM but runs slower.
  distance_batch_size: 2048
  # Compute empirical Lipschitz diagnostics every N iterations. Set <= 0 to disable.
  lipschitz_log_every: 50
  # Number of refinement samples per iteration
  M: 1000
  # Number of iterations of the algorithm
  episodes: 1_000
  # Trajectories run per iteration
  traj_per_iter: 1
  # Tolerance for fixed points
  q_tol: 1.0e-3
  # Iterations for fixed p1int
  q_iter: 100
  # Whether to use optimistic K-step bootstrapping
  do_bootstrap: True
  # Maximum lookahead for K-step bootstrapping and for action chains (if using ChainPolicy).
  max_bootstrap: 3
  # Conservative slack for improving points. TQ + slack < Q .
  td_slack: 0.0
  # Evaluation of J_pi: how many sampels to use
  eval_samples: 1
  # Whether to log metrics to Weights & Biases
  use_wandb: True
  # Weights & Biases project name
  wandb_project: "non-expert-mujoco"
  # Frozen observation encoder: "auto", "none", or "path".
  # "auto" loads non_expert/minari/outputs/<EnvName>/pca_encoder.pkl if present.
  encoder:
    mode: auto
    path:

InvertedPendulum-v5:
  env_id: "InvertedPendulum-v5"
  lambd: 10
  sigma: .5
  policy_type: chain
  episodes: 200
  td_slack: 0.05
  anneal_sigma: True
  encoder:
    mode: path
    path: "non_expert/minari/outputs/InvertedPendulum-v5/pca/pca_encoder.pkl"

Pendulum-v1:
  env_id: "Pendulum-v1"
  episodes: 1_000
  M: 1000
  sigma: 3
  lambd: 10
  encoder:
    mode: "none"

BipedalWalker-v3:
  env_id: "BipedalWalker-v3"
  episodes: 1_000
  M: 1000
  sigma: 3
  lambd: 10

Swimmer-v5:
  env_id: "Swimmer-v5"
  episodes: 1_000
  sigma: 1
  lambd: 2
  gamma: 0.9999  # See https://arxiv.org/pdf/2208.07587
  td_slack: 0.05
  max_bootstrap: 3
  policy_type: chain
  encoder:
    mode: path
    path: "non_expert/minari/outputs/Swimmer-v5/nn_encoder_last/dynamics_encoder.pkl"

HalfCheetah-v5:
  env_id: "HalfCheetah-v5"
  episodes: 1_000
  M: 1000
  traj_per_iter: 1
  sigma: 3
  lambd: 5
  encoder:
    mode: path
    path: "non_expert/minari/outputs/HalfCheetah-v5/pca/pca_encoder.pkl"
    
