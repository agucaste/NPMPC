defaults:
  # MuJoCo environment
  env_id: 
  # Discount factor
  gamma: 0.99
  # Policy parameters
  # Lambda for the upper bound
  lambd: 10
  # std Gaussian noise
  sigma: 2
  # K neighbors
  k: 1000
  # Number of initial samples
  M0: 50
  # Number of refinement samples
  M: 100
  # Number of iterations of the algorithm
  max_iter: 1_000
  # Tolerance for fixed points
  q_tol: 1.0e-3
  # Iterations for fixed point
  q_iter: 1000
  # Evaluation of J_pi: how many sampels to use
  eval_samples: 10

InvertedPendulum-v5:
  env_id: "InvertedPendulum-v5"
  sigma: 1
  

